<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What We Offer – Her Health Project Hub</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #F7E6DA;
      --peach: #F5D8C7;
      --soft-pink: #F2B6A0;
      --accent: #E44B4B;
      --text-dark: #2C1A47;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: linear-gradient(180deg, var(--cream), var(--peach));
      color: var(--text-dark);
      line-height: 1.8;
    }

    .offer-container {
      max-width: 920px;
      margin: 80px auto;
      padding: 50px 45px;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      text-align: center;
    }

    .offer-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 25px;
    }

    .offer-title span {
      color: var(--accent);
    }

    .offer-text {
      font-size: 18px;
      color: #3f3f3f;
      max-width: 780px;
      margin: 0 auto 30px;
    }

    .offer-highlight {
      padding: 22px 28px;
      background: linear-gradient(180deg, var(--peach), var(--soft-pink));
      border-radius: 18px;
      font-weight: 600;
      font-size: 17px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    @media (max-width: 768px) {
      .offer-container {
        margin: 40px 15px;
        padding: 35px 25px;
      }

      .offer-title {
        font-size: 28px;
      }

      .offer-text {
        font-size: 16.5px;
      }
    }
  </style>
</head>
<body>

  <section class="offer-container">
    <h1 class="offer-title">What We <span>Offer</span></h1>

    <p class="offer-text">
      Her Health Project Hub is a trusted and growing voice in advancing women’s health and wellbeing
      across Northern Nigeria.
    </p>

    <p class="offer-text">
      We bring together community insight, research expertise, and global collaboration to make real,
      lasting impact.
    </p>

  </section>

</body>
</html>
