<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Vision – Her Health Project Hub</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #F7E6DA;
      --peach: #F5D8C7;
      --soft-pink: #F2B6A0;
      --accent: #E44B4B;
      --text-dark: #2C1A47;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #F2B6A0;
      color: var(--text-dark);
      line-height: 1.8;
    }

    .vision-container {
      max-width: 900px;
      margin: 80px auto;
      padding: 50px 45px;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 22px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      text-align: center;
    }

    .vision-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 25px;
    }

    .vision-title span {
      color: var(--accent);
    }

    .vision-text {
      font-size: 18px;
      color: #3f3f3f;
      max-width: 760px;
      margin: 0 auto;
    }

    .vision-highlight {
      margin-top: 32px;
      padding: 20px 28px;
      background: linear-gradient(180deg, var(--peach), var(--soft-pink));
      border-radius: 18px;
      font-weight: 600;
      color: var(--text-dark);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    @media (max-width: 768px) {
      .vision-container {
        margin: 40px 15px;
        padding: 35px 25px;
      }

      .vision-title {
        font-size: 28px;
      }

      .vision-text {
        font-size: 16.5px;
      }
    }
  </style>
</head>
<body>

  <section class="vision-container">
    <h1 class="vision-title">Our <span>Vision</span></h1>

    <p class="vision-text">
      A world where every woman, regardless of background or location,
      has the knowledge, support, and confidence needed to live a healthy,
      fulfilled, and empowered life.
    </p>

    <div class="vision-highlight">
      Health • Equity • Empowerment • Opportunity
    </div>
  </section>

</body>
</html>
