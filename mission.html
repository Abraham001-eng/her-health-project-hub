<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Mission – Her Health Project Hub</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #F7E6DA;
      --peach: #F5D8C7;
      --soft-pink: #F2B6A0;
      --accent: #E44B4B;
      --text-dark: #2C1A47;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: linear-gradient(180deg, var(--cream), var(--peach));
      color: var(--text-dark);
      line-height: 1.8;
    }

    .mission-container {
      max-width: 900px;
      margin: 80px auto;
      padding: 50px 45px;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 22px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      text-align: center;
    }

    .mission-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 25px;
    }

    .mission-title span {
      color: var(--accent);
    }

    .mission-text {
      font-size: 18px;
      color: #3f3f3f;
      max-width: 750px;
      margin: 0 auto;
    }

    .mission-highlight {
      margin-top: 30px;
      padding: 18px 25px;
      background: linear-gradient(180deg, var(--peach), var(--soft-pink));
      border-radius: 16px;
      font-weight: 600;
      color: var(--text-dark);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    @media (max-width: 768px) {
      .mission-container {
        margin: 40px 15px;
        padding: 35px 25px;
      }

      .mission-title {
        font-size: 28px;
      }

      .mission-text {
        font-size: 16.5px;
      }
    }
  </style>
</head>
<body>

  <section class="mission-container">
    <h1 class="mission-title">Our <span>Mission</span></h1>

    <p class="mission-text">
      To bridge the gap between research and real-world health improvement by translating
      evidence into action, designing scalable community-based interventions, and empowering
      local systems to deliver sustainable health impact.
    </p>

  
  </section>

</body>
</html>
